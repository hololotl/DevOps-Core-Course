---
name: Ansible Deployment

on:
  push:
    branches: [main, master]
    paths:
      - 'app_python/ansible/**'
      - '!app_python/ansible/docs/**'
      - '.github/workflows/ansible-deploy.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'app_python/ansible/**'
      - '!app_python/ansible/docs/**'

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install ansible ansible-lint

      - name: Run ansible-lint
        run: |
          cd app_python/ansible
          ansible-lint playbooks/*.yml

  deploy:
    name: Deploy Application
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible
        run: pip install ansible

      - name: Read target from inventory
        run: |
          TARGET_HOST=$(awk '/^\[webservers\]/{getline; for(i=1;i<=NF;i++){if($i ~ /^ansible_host=/){split($i,a,"="); print a[2]}}}' app_python/ansible/inventory/hosts.ini)
          TARGET_USER=$(awk '/^\[webservers\]/{getline; for(i=1;i<=NF;i++){if($i ~ /^ansible_user=/){split($i,a,"="); print a[2]}}}' app_python/ansible/inventory/hosts.ini)
          echo "TARGET_HOST=$TARGET_HOST" >> "$GITHUB_ENV"
          echo "TARGET_USER=$TARGET_USER" >> "$GITHUB_ENV"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$TARGET_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Create Vault password file
        run: |
          mkdir -p /tmp
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/vault_pass
          chmod 600 /tmp/vault_pass

      - name: Deploy with Ansible
        run: |
          cd app_python/ansible
          ansible-playbook playbooks/deploy.yml \
            -i inventory/hosts.ini \
            --vault-password-file /tmp/vault_pass
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

      - name: Cleanup Vault password
        run: rm -f /tmp/vault_pass
        if: always()

      - name: Verify Deployment
        run: |
          sleep 10
          ssh -o StrictHostKeyChecking=no "$TARGET_USER@$TARGET_HOST" 'curl -fsS http://localhost:8000/health' || exit 1
          echo "Application health check passed!"

      - name: Log deployment status
        if: success()
        run: |
          echo "✅ Deployment completed successfully"
          echo "Application URL: http://$TARGET_HOST:8000"
