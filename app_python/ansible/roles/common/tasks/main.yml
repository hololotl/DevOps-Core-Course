---
- name: Common packages management (with error handling)
  block:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install common packages
      apt:
        name: "{{ common_packages }}"
        state: present

  rescue:
    - name: Recover apt cache update with --fix-missing
      command: apt-get update --fix-missing
      changed_when: false

    - name: Retry installing common packages after apt recovery
      apt:
        name: "{{ common_packages }}"
        state: present
        update_cache: yes

  always:
    - name: Log common packages block completion
      copy:
        dest: /tmp/common_packages_block.log
        content: "common packages block completed\n"
        mode: "0644"

  become: true
  tags:
    - packages

- name: Common users management
  block:
    - name: Ensure primary common user exists
      user:
        name: "{{ common_user }}"
        state: present
        shell: /bin/bash

    - name: Ensure primary common user is in sudo group
      user:
        name: "{{ common_user }}"
        groups: sudo
        append: yes

  always:
    - name: Log common users block completion
      copy:
        dest: /tmp/common_users_block.log
        content: "common users block completed\n"
        mode: "0644"

  become: true
  tags:
    - users
