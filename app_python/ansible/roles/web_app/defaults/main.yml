---
# Application settings
web_app_name: devops-app
web_app_docker_image: netotveto/devops-app
web_app_docker_tag: 1.0.0  # Lab 6 deployment version
web_app_port: 8000
web_app_internal_port: 5000

# Docker Compose settings
web_app_compose_project_dir: "/opt/{{ web_app_name }}"
web_app_docker_compose_version: "3.8"
web_app_restart_policy: unless-stopped

# Optional environment variables to inject into container
web_app_environment: {}

# Wipe Logic Control
# Set to true to completely remove application
# Usage: ansible-playbook deploy.yml -e "web_app_wipe=true"
# Wipe only:    ansible-playbook deploy.yml -e "web_app_wipe=true" --tags web_app_wipe
# Clean install: ansible-playbook deploy.yml -e "web_app_wipe=true"
web_app_wipe: false
