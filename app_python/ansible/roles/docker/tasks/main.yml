---
- name: Docker installation
  block:
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

  rescue:
    - name: Wait before retry after Docker key/repository failure
      wait_for:
        timeout: 10

    - name: Refresh apt cache before retry
      apt:
        update_cache: yes

    - name: Retry adding Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Retry adding Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Retry Docker packages installation
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

  always:
    - name: Ensure Docker service is enabled and started
      systemd:
        name: docker
        state: started
        enabled: yes

  become: true
  tags:
    - docker_install

- name: Docker configuration
  block:
    - name: Add user to docker group
      user:
        name: "{{ docker_user }}"
        groups: docker
        append: yes

    - name: Install python3-docker via apt
      apt:
        name: python3-docker
        state: present

  become: true
  tags:
    - docker_config
